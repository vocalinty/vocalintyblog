<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocalinty — Contact Us</title>
  <meta name="description" content="Get in touch with Vocalinty — YouTube, Instagram, Spotify, TikTok, or send a message.">
  <link rel="icon" type="image/png" href="assets/VocalintyLogo2.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/VocalintyLogo2.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#161616">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-shell">
    <div id="site-header"></div>
    <main id="info-page"></main>
    <div id="site-footer"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/info.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      window.VocalintyLayout.render('contact')
      const I = window.VocalintyLayout.ICONS
      const s = window.VOCALINTY_CONFIG.social
      const email = window.VOCALINTY_CONFIG.contactEmail

      window.VocalintyInfo.render({
        eyebrow: 'Contact',
        title: 'Contact Us',
        bodyHtml: `
          <p>
            We read everything. — use any of the methods below.
          </p>
          <div class="contact-cards">
            <a href="${s.youtube}" target="_blank" rel="noopener noreferrer" class="contact-card">
              <span class="contact-card__left">${I.youtube} YouTube</span>
              <span class="contact-card__handle">@vocalinty</span>
            </a>
            <a href="${s.instagram}" target="_blank" rel="noopener noreferrer" class="contact-card">
              <span class="contact-card__left">${I.instagram} Instagram</span>
              <span class="contact-card__handle">@vocalinty</span>
            </a>
            <a href="${s.spotify}" target="_blank" rel="noopener noreferrer" class="contact-card">
              <span class="contact-card__left">${I.music} Spotify</span>
              <span class="contact-card__handle">Vocalinty</span>
            </a>
            <a href="${s.tiktok}" target="_blank" rel="noopener noreferrer" class="contact-card">
              <span class="contact-card__left">${I.tiktok} TikTok</span>
              <span class="contact-card__handle">@vocalinty</span>
            </a>
          </div>
          <h2>Send a Message</h2>
          <p>
            Fill out the form below and your email client will open with the
            message pre-filled, addressed to <a href="mailto:${email}">${email}</a>.

          </p>
          <form id="contact-form" class="contact-form">
            <div class="form-row">
              <div class="form-field">
                <label class="form-label" for="c-name">Your name</label>
                <input class="form-input" id="c-name" name="name" type="text" required placeholder="Baby Shark">
              </div>
              <div class="form-field">
                <label class="form-label" for="c-email">Your email</label>
                <input class="form-input" id="c-email" name="email" type="email" required placeholder="babyshark@example.com">
              </div>
            </div>
            <div class="form-field">
              <label class="form-label" for="c-subject">Subject</label>
              <input class="form-input" id="c-subject" name="subject" type="text" placeholder="Collaboration, song suggestion, etc.">
            </div>
            <div class="form-field">
              <label class="form-label" for="c-message">Message</label>
              <textarea class="form-textarea" id="c-message" name="message" rows="6" required placeholder="Write your message here…"></textarea>
            </div>
            <div class="form-actions">

              <button type="submit" class="btn btn-primary">Compose email</button>
            </div>
          </form>
          <h2>Direct Email</h2>
          <p>
            Prefer to write your own email? Reach us at
            <a href="mailto:${email}">${email}</a>.
          </p>
        `,
        onMount: function () {
          const form = document.getElementById('contact-form')
          if (!form) return
          form.addEventListener('submit', function (e) {
            e.preventDefault()
            const data = new FormData(form)
            const name = String(data.get('name') || '').trim()
            const email = String(data.get('email') || '').trim()
            const subject = String(data.get('subject') || '').trim()
            const message = String(data.get('message') || '').trim()
            if (!name || !email || !message) return
            const body = 'Name: ' + name + '\nEmail: ' + email + '\n\n' + message
            const mailto = 'mailto:' + window.VOCALINTY_CONFIG.contactEmail
              + '?subject=' + encodeURIComponent(subject || ('Vocalinty contact from ' + name))
              + '&body=' + encodeURIComponent(body)
            window.location.href = mailto
          })
        },
      })
    })
  </script>
</body>
</html>
