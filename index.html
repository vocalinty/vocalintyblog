<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Open Graph / Facebook / WhatsApp sharing -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://vocalinty.netlify.app/">

  <!-- Twitter / X sharing -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://vocalinty.netlify.app/">
  <meta name="twitter:title" content="Vocalinty — A Channel Journal">
  <meta name="twitter:description" content="Daily Viral News On Music. Music Playlists. Everythere Here!">
  <meta name="twitter:image" content="https://vocalinty.netlify.app/assets/VocalintyLogo2.png">

  <link rel="icon" type="image/png" href="assets/VocalintyLogo2.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/VocalintyLogo2.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#161616">
  <!-- Playfair Display for serif headings -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

  <!-- Adsterra — Social Bar (new) -->
  <script src="https://pl30188460.effectivecpmnetwork.com/09/aa/9c/09aa9cdcebc1b8b79e79cb80a8cb327f.js"></script>
</head>
<body>
  <div class="app-shell">
    <div id="site-header"></div>

    <main>
      <div class="container">
        <!-- Hero -->
        <section class="hero">
          <div class="hero__eyebrow">A Channel Journal</div>
          <h1 class="hero__title">
            Find out more in<br>
            the world of <em>music</em>.
          </h1>
          <p class="hero__sub">
            Daily Viral News On Music. Music Playlists. Everythere Here!
          </p>
        </section>

        <!-- Archive controls -->
        <div class="archive-controls">
          <div class="archive-title">
            <span>The Archive</span>
            <span class="archive-count" id="archive-count">…</span>
          </div>
          <div class="archive-right">
            <div class="search">
              <span class="search__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
              </span>
              <input
                type="text"
                id="search-input"
                class="search__input"
                placeholder="Search articles…"
                aria-label="Search articles"
              >
              <button class="search__clear" id="search-clear" style="display:none" aria-label="Clear search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
              </button>
            </div>
            <div class="sort-toggle">
              <button class="sort-btn is-active" data-sort="views">Most viewed</button>
              <button class="sort-btn" data-sort="latest">Latest</button>
            </div>
          </div>
        </div>

        <!-- Blog list -->
        <div id="blog-list"></div>

        <!-- Native Banner at bottom of blog list (mobile + desktop) -->
        <div style="max-width:1152px;margin:40px auto 0">
          <p style="font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted-fg);margin-bottom:8px;text-align:center">Advertisement</p>
          <div id="container-054d6b8fc4d6249f8d67f75e129e17e1" style="text-align:center;min-height:90px"></div>
        </div>
      </div>
    </main>

    <div id="site-footer"></div>
  </div>

  <!-- Ad sidebar (desktop only, 1440px+ wide screens) -->
  <aside class="ad-sidebar">
    <div class="ad-sidebar__card">
      <p class="ad-sidebar__label">Advertisement</p>
      <div id="sidebar-ad-container"></div>
    </div>
    <a href="https://www.effectivecpmnetwork.com/uzwn33bunr?key=1f548aa6d383a4d76d574d6ff09a2d2d"
       target="_blank" rel="noopener noreferrer" class="ad-sidebar__smart-link">
      Sponsored Link
    </a>
  </aside>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Adsterra Native Banner script -->
  <script async="async" data-cfasync="false" src="https://pl30188056.effectivecpmnetwork.com/054d6b8fc4d6249f8d67f75e129e17e1/invoke.js"></script>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/home.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      window.VocalintyLayout.render('home')
      window.VocalintyHome.init()
      // After Adsterra invoke.js loads, it fills #container-054d6b8fc4d6249f8d67f75e129e17e1.
      // Clone that ad into the sidebar container so desktop users see it on the side too.
      setTimeout(function () {
        var main = document.getElementById('container-054d6b8fc4d6249f8d67f75e129e17e1')
        var side = document.getElementById('sidebar-ad-container')
        if (main && side && main.innerHTML) {
          side.innerHTML = main.innerHTML
        }
      }, 2000)
    })
  </script>
</body>
</html>
